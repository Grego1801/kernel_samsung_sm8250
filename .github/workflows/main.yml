name: Build Samsung SM8250 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: Grego1801/kernel_samsung_sm8250
        fetch-depth: 1

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git make bc bison flex \
          libssl-dev libelf-dev \
          python3 zip unzip curl \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          cpio clang-14 lld-14 llvm-14

    - name: Setup Clang path
      run: |
        mkdir -p $HOME/clang/bin
        for tool in clang clang++ ld.lld llvm-ar llvm-nm \
                    llvm-objcopy llvm-objdump llvm-strip; do
          ln -sf /usr/bin/${tool}-14 $HOME/clang/bin/${tool}
        done
        echo "$HOME/clang/bin" >> $GITHUB_PATH
        clang --version

    - name: Show all configs in repo
      run: |
        echo "=== All configs ==="
        find arch/arm64/configs/ | sort

    - name: Configure kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export ANDROID_MAJOR_VERSION=r
        export PLATFORM_VERSION=11

        # Samsung SM8250 (Kona) uses vendor/kona-perf_defconfig as base
        # then merges samsung config fragments on top
        make O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          vendor/kona-perf_defconfig

        # Merge Samsung common fragment if it exists
        if [ -f arch/arm64/configs/vendor/samsung/kona-sec-common.config ]; then
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/samsung/kona-sec-common.config
        fi

        # Enable modules
        echo "CONFIG_MODULES=y" >> out/.config
        echo "CONFIG_MODULE_UNLOAD=y" >> out/.config

        make O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          olddefconfig

    - name: Build kernel and modules
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export ANDROID_MAJOR_VERSION=r
        export PLATFORM_VERSION=11

        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          ANDROID_MAJOR_VERSION=r \
          2>&1 | tee build.log

    - name: Collect outputs
      run: |
        mkdir -p artifacts
        cp out/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
        cp out/arch/arm64/boot/Image.gz-dtb artifacts/ 2>/dev/null || true
        cp out/arch/arm64/boot/Image.gz artifacts/ 2>/dev/null || true
        find out/ -name "*.ko" -exec cp {} artifacts/ \;
        echo "=== Build outputs ==="
        ls -lh artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-sm8250-${{ github.run_number }}
        path: |
          artifacts/
          build.log
        retention-days: 7