name: Build Samsung SM8250 Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout your kernel source
      uses: actions/checkout@v4
      with:
        repository: Grego1801/kernel_samsung_sm8250
        fetch-depth: 1

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git make bc bison flex \
          libssl-dev libelf-dev \
          python3 zip unzip curl \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          cpio

    - name: Download Clang toolchain
      run: |
        mkdir -p $HOME/clang
        wget -q https://github.com/kdrag0n/proton-clang/releases/download/20210522/proton-clang-20210522.tar.zst \
          -O clang.tar.zst || \
        wget -q https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20220630-release/Clang-14.0.6-20220630.tar.gz \
          -O clang.tar.gz
        # Try zst first, fallback to gz
        if [ -f clang.tar.zst ]; then
          sudo apt-get install -y zstd
          tar --use-compress-program=unzstd -xf clang.tar.zst -C $HOME/clang --strip-components=1
        else
          tar -xf clang.tar.gz -C $HOME/clang --strip-components=1
        fi

    - name: List available defconfigs
      run: |
        echo "=== Available defconfigs ==="
        find arch/arm64/configs/ -name "*defconfig*" | sort

    - name: Configure kernel
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export ANDROID_MAJOR_VERSION=r

        # Auto-detect the defconfig
        DEFCONFIG=$(find arch/arm64/configs -name "*kona*" -o -name "*sm8250*" \
          | grep -v fragment | head -1 | xargs basename)

        if [ -z "$DEFCONFIG" ]; then
          # Fallback: look for vendor subfolder
          DEFCONFIG=$(find arch/arm64/configs/vendor -name "*kona*" \
            | head -1 | sed 's|arch/arm64/configs/||')
        fi

        echo "Using defconfig: $DEFCONFIG"
        echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV

        make O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          $DEFCONFIG

        # Enable loadable module support
        echo "CONFIG_MODULES=y" >> out/.config
        echo "CONFIG_MODULE_UNLOAD=y" >> out/.config
        make O=out ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          olddefconfig

    - name: Build kernel and modules
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
          ANDROID_MAJOR_VERSION=r \
          2>&1 | tee build.log
        echo "Build exit code: $?"

    - name: Collect outputs
      run: |
        mkdir -p artifacts
        # Kernel image
        cp out/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
        cp out/arch/arm64/boot/Image.gz-dtb artifacts/ 2>/dev/null || true
        # All .ko modules
        find out/ -name "*.ko" -exec cp {} artifacts/ \;
        echo "=== Build outputs ==="
        ls -lh artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-sm8250-${{ github.run_number }}
        path: |
          artifacts/
          build.log
        retention-days: 7