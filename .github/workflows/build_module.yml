name: Build Kernel Headers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-headers:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v3

      - name: Set Timezone
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "America/Sao_Paulo"

      - name: Setting up the environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            python3 zip unzip \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            cpio clang-14 lld-14 llvm-14

      - name: Setup Clang
        run: |
          mkdir -p $HOME/clang/bin
          for tool in clang clang++ ld.lld llvm-ar llvm-nm \
                      llvm-objcopy llvm-objdump llvm-strip; do
            ln -sf /usr/bin/${tool}-14 $HOME/clang/bin/${tool}
          done
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Fix KernelSU Kconfig
        run: |
          rm -rf drivers/kernelsu
          mkdir -p drivers/kernelsu
          cat > drivers/kernelsu/Kconfig << 'EOF'
          menu "KernelSU"

          config KSU
            tristate "KernelSU function support"
            default n
            help
              Enable KernelSU

          endmenu
          EOF
          cat > drivers/kernelsu/Makefile << 'EOF'
          # empty
          EOF
      name: Build Kernel Headers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-headers:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v3

      - name: Set Timezone
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "America/Sao_Paulo"

      - name: Setting up the environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            python3 zip unzip \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            cpio clang-14 lld-14 llvm-14

      - name: Setup Clang
        run: |
          mkdir -p $HOME/clang/bin
          for tool in clang clang++ ld.lld llvm-ar llvm-nm \
                      llvm-objcopy llvm-objdump llvm-strip; do
            ln -sf /usr/bin/${tool}-14 $HOME/clang/bin/${tool}
          done
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Fix KernelSU Kconfig
        run: |
          rm -rf drivers/kernelsu
          mkdir -p drivers/kernelsu
          cat > drivers/kernelsu/Kconfig << 'EOF'
          menu "KernelSU"

          config KSU
            tristate "KernelSU function support"
            default n
            help
              Enable KernelSU

          endmenu
          EOF
          cat > drivers/kernelsu/Makefile << 'EOF'
          # empty
          EOF

      - name: Build Kernel Headers
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ANDROID_MAJOR_VERSION=r
          export PLATFORM_VERSION=11

          make O=out \
            ARCH=arm64 CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            vendor/kona-perf_defconfig

          echo "CONFIG_MODULES=y" >> out/.config
          echo "CONFIG_MODULE_UNLOAD=y" >> out/.config

          make O=out \
            ARCH=arm64 CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            olddefconfig

          make -j$(nproc) O=out \
            ARCH=arm64 CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ANDROID_MAJOR_VERSION=r \
            scripts prepare modules_prepare

      - name: Package Headers
        run: |
          tar -czf kernel-headers.tar.gz out/

      - name: Upload Kernel Headers
        uses: actions/upload-artifact@v4
        with:
          name: kernel-headers
          path: kernel-headers.tar.gz
          retention-days: 90

